services:
  discord-calendar-bot:
    build: .
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CALENDAR_ID=${CALENDAR_ID}
      - CREDENTIALS_PATH=/app/credentials/service_account.json
      - ALLOWED_USER_IDS=${ALLOWED_USER_IDS}
    volumes:
      - ${CREDENTIALS_SOURCE}:/app/credentials/service_account.json:ro
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"